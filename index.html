<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>مولد تقارير الدورات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background-image:url("https://raw.githubusercontent.com/xhhp1/mechanics/main/images/mecha.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:rgba(20,20,20,0.65);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

h1{
text-align:center;
margin-bottom:30px;
font-weight:700;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input, select{
width:100%;
padding:10px;
border-radius:8px;
border:none;
background:#1e1e1e;
color:white;
font-family:'Cairo',sans-serif;
}

textarea{
width:100%;
height:250px;
padding:12px;
border-radius:8px;
border:none;
background:#1e1e1e;
color:white;
resize:none;
font-family:'Cairo',sans-serif;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.result{
margin-top:30px;
background:#0d0d0d;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
border:1px solid #333;
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<h1>مولد تقارير الدورة</h1>

<label>اسم الدورة</label>

<select id="courseName">
<option>خدمات طرق</option>
<option selected>العمليات</option>
<option>التعديل و التزويد</option>
<option>التصنيع</option>
<option>شئون الكراج</option>
<option>مدربين الورش</option>
<option>الدليل الشامل</option>
<option>الشئون الادارية</option>
</select>

<label>رقم الدورة</label>
<input id="courseNumber" value="3">

<label>الصق البيانات هنا</label>
<textarea id="data"></textarea>

<button onclick="generate()">إنشاء التقرير</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

function extractID(line){

let match=line.match(/\d{12,}/)

return match ? match[0] : ""

}

function extractScore(line){

let score20=line.match(/(\d+)\s*\/\s*20/)

if(score20){
return Math.round(parseInt(score20[1]) / 2)
}

let score10=line.match(/(\d+)\s*\/\s*10/)

if(score10){
return parseInt(score10[1])
}

return null

}

function generate(){

let lines=document.getElementById("data").value.split("\n")

let g10=[]
let g9=[]
let g8=[]
let g7=[]
let fail=[]

lines.forEach(line=>{

let score=extractScore(line)

if(score===null) return

let id=extractID(line)

let mention="<@"+id+">"

if(score>=10) g10.push(mention)
else if(score==9) g9.push(mention)
else if(score==8) g8.push(mention)
else if(score==7) g7.push(mention)
else fail.push(mention)

})

let course=document.getElementById("courseName").value
let num=document.getElementById("courseNumber").value

let report="***```اسم الدورة ( "+course+" ) ("+num+")```***\n\n"

if(g10.length>0){
report+="***10 / 10***\n"+g10.join("\n")+"\n\n"
}

if(g9.length>0){
report+="***10 / 09***\n"+g9.join("\n")+"\n\n"
}

if(g8.length>0){
report+="***10 / 08***\n"+g8.join("\n")+"\n\n"
}

if(g7.length>0){
report+="***10 / 07***\n"+g7.join("\n")+"\n\n"
}

if(fail.length>0){
report+="***أقل من 7 (ساقط)***\n"+fail.join("\n")+"\n\n"
}

report+="------------------------------------------------"

document.getElementById("result").textContent=report

}

</script>

</body>

</html>
